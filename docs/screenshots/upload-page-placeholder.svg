<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="accent" x1="280" y1="190" x2="1000" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="180" fill="#DBEAFE" fill-opacity="0.65"/>
  <rect x="120" y="72" width="1040" height="72" rx="24" fill="white" fill-opacity="0.72"/>
  <rect x="120" y="180" width="1040" height="420" rx="28" fill="white" fill-opacity="0.78"/>
  <rect x="180" y="250" width="920" height="280" rx="26" fill="#F8FBFF" stroke="#CBD5E1" stroke-dasharray="10 10"/>
  <rect x="500" y="468" width="280" height="48" rx="18" fill="url(#accent)"/>
  <text x="180" y="114" fill="#0F172A" font-family="Arial, sans-serif" font-size="30" font-weight="700">SeqDelta Upload Page</text>
  <text x="180" y="220" fill="#334155" font-family="Arial, sans-serif" font-size="20">Placeholder screenshot for the local FASTA upload interface</text>
  <text x="640" y="362" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="30" font-weight="700">Drag or select reference and mutant FASTA files</text>
  <text x="640" y="408" text-anchor="middle" fill="#64748B" font-family="Arial, sans-serif" font-size="20">Replace with a real browser screenshot before release</text>
  <text x="640" y="499" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="700">Analyze Sequences</text>
</svg>
